<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feed — MiniSocial</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/api.js"></script>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="feed.html" class="logo">Mini<em>Social</em></a>
    <div class="nav-links">
      <span class="nav-user" id="navUsername"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <div class="feed-layout">

    <!-- ── Main feed column ── -->
    <main>
      <!-- Compose box -->
      <div class="compose">
        <textarea
          id="postContent"
          placeholder="What's on your mind?"
          maxlength="280"
          oninput="updateCharCount()"
        ></textarea>
        <div class="compose-footer">
          <span class="char-count" id="charCount">280</span>
          <button class="btn btn-primary btn-sm" onclick="submitPost()">Post</button>
        </div>
      </div>

      <!-- Feed posts -->
      <div id="feed">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </main>

    <!-- ── Sidebar: people to follow ── -->
    <aside class="sidebar">
      <div class="sidebar-card">
        <p class="sidebar-title">People</p>
        <div id="userList">
          <div class="loading-center"><div class="spinner"></div></div>
        </div>
      </div>
    </aside>

  </div>
</div>

<script>
  requireAuth();

  const user = getUser();
  document.getElementById('navUsername').textContent = '@' + user.username;

  // ── Load feed ────────────────────────────────────────
  async function loadFeed() {
    const feedEl = document.getElementById('feed');
    try {
      const posts = await api('GET', '/api/posts/feed');
      if (posts.length === 0) {
        feedEl.innerHTML = `
          <div class="empty">
            <strong>Your feed is empty</strong>
            Follow some people on the right to see their posts.
          </div>`;
        return;
      }
      feedEl.innerHTML = posts.map(renderPost).join('');
    } catch (err) {
      feedEl.innerHTML = `<div class="empty">Failed to load feed: ${err.message}</div>`;
    }
  }

  function renderPost(p) {
    return `
      <div class="post-card">
        <div class="post-meta">
          <div class="post-avatar">${avatarLetter(p.username)}</div>
          <span class="post-username">@${p.username}</span>
          <span class="post-time">${timeAgo(p.created_at)}</span>
        </div>
        <p class="post-content">${escapeHtml(p.content)}</p>
      </div>`;
  }

  // ── Submit a post ─────────────────────────────────────
  async function submitPost() {
    const ta = document.getElementById('postContent');
    const content = ta.value.trim();
    if (!content) return;

    try {
      await api('POST', '/api/posts', { content });
      ta.value = '';
      updateCharCount();
      loadFeed(); // refresh feed
    } catch (err) {
      alert('Could not post: ' + err.message);
    }
  }

  // Allow Ctrl+Enter to post
  document.getElementById('postContent').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitPost();
  });

  // ── Character counter ──────────────────────────────────
  function updateCharCount() {
    const len = document.getElementById('postContent').value.length;
    const el  = document.getElementById('charCount');
    el.textContent = 280 - len;
    el.classList.toggle('warn', len > 240);
  }

  // ── Load users sidebar ─────────────────────────────────
  async function loadUsers() {
    const listEl = document.getElementById('userList');
    try {
      const users = await api('GET', '/api/users');
      if (users.length === 0) {
        listEl.innerHTML = '<p style="font-size:0.85rem;color:var(--ink-3)">No other users yet.</p>';
        return;
      }
      listEl.innerHTML = users.map(u => `
        <div class="user-row" id="user-row-${u.id}">
          <div class="post-avatar" style="width:28px;height:28px;font-size:0.78rem">${avatarLetter(u.username)}</div>
          <span class="user-row-name">@${u.username}</span>
          <button
            class="btn btn-ghost btn-sm btn-follow ${u.is_following ? 'following' : ''}"
            id="follow-btn-${u.id}"
            onclick="toggleFollow(${u.id})"
          >${u.is_following ? 'Following' : 'Follow'}</button>
        </div>`).join('');
    } catch (err) {
      listEl.innerHTML = '<p style="font-size:0.85rem;color:var(--ink-3)">Could not load users.</p>';
    }
  }

  // ── Follow / unfollow ──────────────────────────────────
  async function toggleFollow(userId) {
    const btn = document.getElementById('follow-btn-' + userId);
    btn.disabled = true;
    try {
      const data = await api('POST', `/api/users/${userId}/follow`);
      btn.textContent = data.following ? 'Following' : 'Follow';
      btn.classList.toggle('following', data.following);
      loadFeed(); // refresh feed after follow change
    } catch (err) {
      alert(err.message);
    } finally {
      btn.disabled = false;
    }
  }

  // ── Logout ─────────────────────────────────────────────
  function logout() {
    clearAuth();
    window.location.href = 'login.html';
  }

  // ── Escape HTML (prevent XSS) ──────────────────────────
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Init ────────────────────────────────────────────────
  loadFeed();
  loadUsers();
</script>
</body>
</html>
