<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — MiniSocial</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/api.js"></script>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Mini<em>Social</em></h1>
    <p class="auth-subtitle">Sign in to see what's happening.</p>

    <div class="error-msg" id="error"></div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username" placeholder="your_handle" maxlength="20"/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••"/>
    </div>

    <button class="btn btn-primary btn-block" id="loginBtn" onclick="handleLogin()">Sign in</button>

    <p class="auth-switch">
      No account? <a href="signup.html">Create one →</a>
    </p>
  </div>
</div>

<script>
  requireGuest(); // redirect to feed if already logged in

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  async function handleLogin() {
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('error');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    errEl.classList.remove('show');

    if (!username || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const data = await api('POST', '/api/auth/login', { username, password });
      saveAuth(data.token, data.username, data.userId);
      window.location.href = 'feed.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }
</script>
</body>
</html>
