<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign up — MiniSocial</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="api.js"></script>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Join Mini<em>Social</em></h1>
    <p class="auth-subtitle">Pick a username and get started.</p>

    <div class="error-msg" id="error"></div>

    <div class="field">
      <label for="username">Username <span style="font-weight:300;text-transform:none;letter-spacing:0">(3–20 chars)</span></label>
      <input type="text" id="username" autocomplete="username" placeholder="your_handle" maxlength="20"/>
    </div>
    <div class="field">
      <label for="password">Password <span style="font-weight:300;text-transform:none;letter-spacing:0">(min 6 chars)</span></label>
      <input type="password" id="password" autocomplete="new-password" placeholder="••••••••"/>
    </div>

    <button class="btn btn-primary btn-block" id="signupBtn" onclick="handleSignup()">Create account</button>

    <p class="auth-switch">
      Already have one? <a href="login.html">Sign in →</a>
    </p>
  </div>
</div>

<script>
  requireGuest();

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSignup();
  });

  async function handleSignup() {
    const btn = document.getElementById('signupBtn');
    const errEl = document.getElementById('error');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    errEl.classList.remove('show');

    if (!username || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      const data = await api('POST', '/api/auth/signup', { username, password });
      saveAuth(data.token, data.username, data.userId);
      window.location.href = 'feed.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  }
</script>
</body>
</html>
